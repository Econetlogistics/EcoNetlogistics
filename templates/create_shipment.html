{% extends "base.html" %}

{% block content %}

<h2>Create Shipment</h2>

<form method="POST">

<div class="row">

<div class="col-md-6 mb-3">
<label>Sender Name</label>
<input
type="text"
name="sender_name"
class="form-control"
required>
</div>

<div class="col-md-6 mb-3">
<label>Receiver Name</label>
<input
type="text"
name="receiver_name"
class="form-control"
required>
</div>

<div class="col-md-6 mb-3">
<label>Origin</label>
<input
type="text"
name="origin"
class="form-control"
required>
</div>

<div class="col-md-6 mb-3">
<label>Destination</label>
<input
type="text"
name="destination"
class="form-control"
required>
</div>

<div class="col-md-6 mb-3">
<label>Weight (kg)</label>
<input
type="number"
step="0.1"
name="weight"
class="form-control"
required>
</div>

<div class="col-md-6 mb-3">
<label>Shipment Type</label>

<select
name="shipment_type"
class="form-select">

<option value="Air Freight">Air Freight</option>

<option value="Sea Freight">Sea Freight</option>

<option value="Road Freight">Road Freight</option>

<option value="Express Delivery">Express Delivery</option>

</select>

</div>

</div>

<button class="btn btn-primary">
Create Shipment
</button>

</form>

{% endblock %}
