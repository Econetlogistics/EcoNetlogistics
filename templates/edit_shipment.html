{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header bg-warning text-dark">

            <h3>Edit Shipment</h3>

        </div>

        <div class="card-body">

            <form method="POST">

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Sender Name</label>
                        <input
                            type="text"
                            class="form-control"
                            name="sender_name"
                            value="{{ shipment.sender_name }}"
                            required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Receiver Name</label>
                        <input
                            type="text"
                            class="form-control"
                            name="receiver_name"
                            value="{{ shipment.receiver_name }}"
                            required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Origin</label>
                        <input
                            type="text"
                            class="form-control"
                            name="origin"
                            value="{{ shipment.origin }}"
                            required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Destination</label>
                        <input
                            type="text"
                            class="form-control"
                            name="destination"
                            value="{{ shipment.destination }}"
                            required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Weight (kg)</label>
                        <input
                            type="number"
                            step="0.1"
                            class="form-control"
                            name="weight"
                            value="{{ shipment.weight }}"
                            required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Shipment Type</label>

                        <select
                            class="form-select"
                            name="shipment_type">

                            <option value="Air Freight"
                            {% if shipment.shipment_type=="Air Freight" %}selected{% endif %}>
                            Air Freight
                            </option>

                            <option value="Sea Freight"
                            {% if shipment.shipment_type=="Sea Freight" %}selected{% endif %}>
                            Sea Freight
                            </option>

                            <option value="Road Freight"
                            {% if shipment.shipment_type=="Road Freight" %}selected{% endif %}>
                            Road Freight
                            </option>

                            <option value="Express Delivery"
                            {% if shipment.shipment_type=="Express Delivery" %}selected{% endif %}>
                            Express Delivery
                            </option>

                        </select>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Shipment Status
                        </label>

                        <select
                            class="form-select"
                            name="current_status">

                            <option value="Pending"
                            {% if shipment.current_status=="Pending" %}selected{% endif %}>
                            Pending
                            </option>

                            <option value="In Transit"
                            {% if shipment.current_status=="In Transit" %}selected{% endif %}>
                            In Transit
                            </option>

                            <option value="Out For Delivery"
                            {% if shipment.current_status=="Out For Delivery" %}selected{% endif %}>
                            Out For Delivery
                            </option>

                            <option value="Delivered"
                            {% if shipment.current_status=="Delivered" %}selected{% endif %}>
                            Delivered
                            </option>

                        </select>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Current Location
                        </label>

                        <input
                            type="text"
                            class="form-control"
                            name="current_location"
                            value="{{ shipment.current_location }}">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Estimated Delivery
                        </label>

                        <input
                            type="date"
                            class="form-control"
                            name="estimated_delivery"
                            value="{{ shipment.estimated_delivery }}">

                    </div>

                </div>

                <div class="mt-3">

                    <button
                        type="submit"
                        class="btn btn-success">

                        Update Shipment

                    </button>

                    <a
                        href="/shipments"
                        class="btn btn-secondary">

                        Cancel

                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
